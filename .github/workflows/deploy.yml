# =====================================================
# IntelliSight — GitHub Pages Deploy with Secret Key
# =====================================================
# This workflow:
#   1. Checks out your code
#   2. Generates config.js from a GitHub repository secret
#   3. Deploys everything to GitHub Pages
#
# SETUP (one-time):
#   1. Go to your repo → Settings → Secrets and variables → Actions
#   2. Click "New repository secret"
#   3. Name:  INTELLISIGHT_KEY
#      Value: your actual LLM key (e.g. sk-ant-api03-xxxxx)
#   4. Go to Settings → Pages → Build and deployment
#      → Source: select "GitHub Actions"
#
# That's it. Every push to main will auto-deploy with the
# key baked into config.js — the key never appears in any
# committed file.
# =====================================================

name: Deploy IntelliSight to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Grant permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject config.js from secret
        run: |
          echo "// Auto-generated by GitHub Actions — do not commit" > config.js
          echo "window.INTELLISIGHT_KEY = '${{ secrets.INTELLISIGHT_KEY }}';" >> config.js
          echo "✅ config.js created (key length: ${#INTELLISIGHT_KEY} chars)"
        env:
          INTELLISIGHT_KEY: ${{ secrets.INTELLISIGHT_KEY }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire root — index.html, config.js, and any assets
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
